<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Haven — Screen Share</title>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
    }
    h1 { font-size: 1.25rem; font-weight: 600; }
    #status {
      padding: 0.5rem 1.25rem;
      border-radius: 9999px;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .disconnected { background: #333; color: #aaa; }
    .connecting   { background: #3b2f00; color: #fbbf24; }
    .connected    { background: #052e16; color: #4ade80; }
    .error        { background: #3b0000; color: #f87171; }
    button {
      padding: 0.75rem 2rem;
      border-radius: 0.75rem;
      border: 1px solid #555;
      background: #222;
      color: #eee;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #333; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #info { font-size: 0.75rem; color: #888; max-width: 30rem; text-align: center; }
  </style>
</head>
<body>
  <h1>Haven Screen Share</h1>
  <div id="status" class="disconnected">Disconnected</div>
  <button id="shareBtn" onclick="startShare()">Share Screen</button>
  <p id="info">
    This page captures your screen and publishes it to the Haven LiveKit room.
    Keep this tab open while using Haven.
  </p>

  <script>
    const statusEl = document.getElementById('status');
    const shareBtn = document.getElementById('shareBtn');

    let room = null;

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = cls;
    }

    function getSessionIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('session_id') || '';
    }

    async function startShare() {
      shareBtn.disabled = true;
      setStatus('Connecting...', 'connecting');

      try {
        const sessionId = getSessionIdFromUrl();

        const configResp = await fetch('/screen/config');
        const config = await configResp.json();
        const apiUrl = config.haven_api_url;
        const workerId = config.worker_id;
        const sid = sessionId || config.session_id || '';

        if (!sid) {
          setStatus('No session ID — pass ?session_id=...', 'error');
          shareBtn.disabled = false;
          return;
        }

        const tokenResp = await fetch(`${apiUrl}/livekit/worker-token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sid }),
        });
        if (!tokenResp.ok) throw new Error(`Token request failed: ${tokenResp.status}`);
        const tokenData = await tokenResp.json();

        const stream = await navigator.mediaDevices.getDisplayMedia({
          video: { frameRate: 15 },
          audio: false,
        });

        room = new LivekitClient.Room();
        await room.connect(tokenData.ws_url, tokenData.token);

        const videoTrack = stream.getVideoTracks()[0];
        const localTrack = new LivekitClient.LocalVideoTrack(videoTrack);
        await room.localParticipant.publishTrack(localTrack, {
          name: 'screen',
          source: LivekitClient.Track.Source.ScreenShare,
        });

        setStatus('Connected — sharing screen', 'connected');

        if (workerId) {
          try {
            await fetch(`${apiUrl}/workers/${workerId}/screen-ready?session_id=${sid}`, {
              method: 'POST',
            });
          } catch (e) {
            console.warn('screen-ready notification failed:', e);
          }
        }

        videoTrack.onended = () => {
          setStatus('Screen share stopped', 'disconnected');
          if (room) room.disconnect();
          shareBtn.disabled = false;
        };

        room.on('disconnected', () => {
          setStatus('Disconnected from room', 'disconnected');
          shareBtn.disabled = false;
        });

      } catch (err) {
        console.error(err);
        setStatus(`Error: ${err.message}`, 'error');
        shareBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
